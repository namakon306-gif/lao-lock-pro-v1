# lao-lock-pro-v1
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LAO LOCK AI PRO</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#0f0f0f;
    color:#fff;
    font-family:sans-serif;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:15px;
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    color:#ffd700;
    margin-bottom:20px;
}

.card{
    background:#1b1b1b;
    border-radius:15px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 0 10px rgba(0,0,0,.4);
}

textarea{
    width:100%;
    height:220px;
    resize:none;
    border:none;
    outline:none;
    border-radius:10px;
    background:#000;
    color:#00ff99;
    padding:12px;
    font-size:16px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:12px;
}

button{
    flex:1;
    min-width:140px;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:bold;
    cursor:pointer;
    font-size:15px;
}

.run{
    background:#ffd700;
    color:#000;
}

.copy{
    background:#00c8ff;
    color:#000;
}

.random{
    background:#00ff99;
    color:#000;
}

.clear{
    background:#ff4444;
    color:#fff;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:15px;
}

.result{
    background:#000;
    border-radius:10px;
    padding:12px;
    margin-top:10px;
    min-height:180px;
    white-space:pre-wrap;
    line-height:1.8;
    color:#00ff99;
    overflow:auto;
}

.footer{
    text-align:center;
    color:#777;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="title">
🔥 LAO LOCK AI PRO v1 by Namakon
</div>

<div class="card">

<h3>📥 ป้อนผลย้อนหลัง</h3>

<textarea id="inputData">
123456
654321
112233
908172
791245
170938
381279
779911
</textarea>

<div class="buttons">

<button class="run" onclick="analyze()">
📊 วิเคราะห์
</button>

<button class="copy" onclick="copyAll()">
📋 คัดลอกผล
</button>

<button class="random" onclick="smartRandom()">
🎲 สุ่มเลข AI
</button>

<button class="clear" onclick="clearAll()">
🗑️ ล้างข้อมูล
</button>

</div>

</div>

<div class="grid">

<div class="card">
<h3>🔥 เลขร้อน / เย็น</h3>
<div id="hotCold" class="result"></div>
</div>

<div class="card">
<h3>🔒 คู่ล็อคเด่น</h3>
<div id="pairLock" class="result"></div>
</div>

<div class="card">
<h3>🎯 วินเด่น</h3>
<div id="winResult" class="result"></div>
</div>

<div class="card">
<h3>📈 AI SCORE</h3>
<div id="scoreResult" class="result"></div>
</div>

<div class="card">
<h3>♻️ เลขกลับ</h3>
<div id="reverseResult" class="result"></div>
</div>

<div class="card">
<h3>📊 วิเคราะห์ตำแหน่ง</h3>
<div id="positionResult" class="result"></div>
</div>

</div>

<div class="footer">
LAO LOCK AI PRO V1
</div>

</div>

<script>

let globalScore = [];

function analyze(){

    let raw =
    document.getElementById('inputData').value;

    let rows =
    raw.split(/\n+/)
    .map(v=>v.trim())
    .filter(v=>v!="");

    let digitCount = {};
    let pairCount = {};
    let reverseMap = {};

    let position = {
        hundred:{},
        ten:{},
        unit:{}
    };

    let winMap = {};

    rows.forEach(num=>{

        let clean =
        num.replace(/\D/g,'');

        if(clean.length < 2) return;

        let arr = clean.split('');

        // เลขร้อน
        arr.forEach(d=>{

            digitCount[d] =
            (digitCount[d]||0)+1;

        });

        // วิเคราะห์ตำแหน่ง
        if(clean.length >= 3){

            let h = clean[0];
            let t = clean[1];
            let u = clean[2];

            position.hundred[h] =
            (position.hundred[h]||0)+1;

            position.ten[t] =
            (position.ten[t]||0)+1;

            position.unit[u] =
            (position.unit[u]||0)+1;

        }

        // คู่ล็อค
        for(let i=0;i<arr.length;i++){

            for(let j=i+1;j<arr.length;j++){

                let pair =
                [arr[i],arr[j]]
                .sort()
                .join('');

                pairCount[pair] =
                (pairCount[pair]||0)+1;

            }

        }

        // วิน 3
        if(arr.length >= 3){

            let unique =
            [...new Set(arr)];

            if(unique.length >= 3){

                for(let a=0;a<unique.length;a++){

                    for(let b=a+1;b<unique.length;b++){

                        for(let c=b+1;c<unique.length;c++){

                            let key =
                            [unique[a],unique[b],unique[c]]
                            .sort()
                            .join('');

                            winMap[key] =
                            (winMap[key]||0)+1;

                        }

                    }

                }

            }

        }

        // เลขกลับ
        for(let i=0;i<arr.length-1;i++){

            let pair =
            arr[i]+arr[i+1];

            let rev =
            pair.split('').reverse().join('');

            if(pair != rev){

                reverseMap[pair+" ↔ "+rev] =
                (reverseMap[pair+" ↔ "+rev]||0)+1;

            }

        }

    });

    // เลขร้อนเย็น
    let hot =
    Object.entries(digitCount)
    .sort((a,b)=>b[1]-a[1]);

    let hotText = "🔥 ร้อน\n\n";

    hot.slice(0,5).forEach(v=>{

        hotText +=
        v[0]+" = "+v[1]+" ครั้ง\n";

    });

    hotText += "\n❄️ เย็น\n\n";

    hot.slice(-5).forEach(v=>{

        hotText +=
        v[0]+" = "+v[1]+" ครั้ง\n";

    });

    document.getElementById('hotCold')
    .innerText = hotText;

    // คู่ล็อค
    let pair =
    Object.entries(pairCount)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,15);

    let pairText = "";

    pair.forEach(v=>{

        pairText +=
        "🔒 "+v[0]+" = "+v[1]+" ครั้ง\n";

    });

    document.getElementById('pairLock')
    .innerText = pairText;

    // วินเด่น
    let win =
    Object.entries(winMap)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,20);

    let winText = "";

    win.forEach(v=>{

        winText +=
        "🎯 "+v[0]+" = "+v[1]+" ครั้ง\n";

    });

    document.getElementById('winResult')
    .innerText = winText;

    // AI SCORE
    let scoreArr = [];

    pair.forEach(v=>{

        let score = 0;

        score += v[1]*10;

        v[0].split('').forEach(d=>{

            score += digitCount[d]||0;

        });

        scoreArr.push({
            pair:v[0],
            score:score
        });

    });

    scoreArr.sort((a,b)=>b.score-a.score);

    globalScore = scoreArr;

    let scoreText = "";

    scoreArr.forEach(v=>{

        scoreText +=
        "🤖 "+v.pair+
        " = "+v.score+
        "%\n";

    });

    document.getElementById('scoreResult')
    .innerText = scoreText;

    // เลขกลับ
    let reverse =
    Object.entries(reverseMap)
    .sort((a,b)=>b[1]-a[1])
    .slice(0,15);

    let reverseText = "";

    reverse.forEach(v=>{

        reverseText +=
        "♻️ "+v[0]+
        " = "+v[1]+" ครั้ง\n";

    });

    document.getElementById('reverseResult')
    .innerText = reverseText;

    // วิเคราะห์ตำแหน่ง (แสดง 4 ตัว)
    function topPos(obj){

        return Object.entries(obj)
        .sort((a,b)=>b[1]-a[1])
        .slice(0,4)
        .map(v=>v[0]+"("+v[1]+")")
        .join(" ");

    }

    let posText = "";

    posText +=
    "ร้อย:\n"+
    topPos(position.hundred);

    posText +=
    "\n\nสิบ:\n"+
    topPos(position.ten);

    posText +=
    "\n\nหน่วย:\n"+
    topPos(position.unit);

    document.getElementById('positionResult')
    .innerText = posText;

    // save
    localStorage.setItem(
        'lao_ai_data',
        raw
    );

}

function smartRandom(){

    if(globalScore.length == 0){

        alert('กรุณาวิเคราะห์ก่อน');
        return;

    }

    let top =
    globalScore.slice(0,10);

    let result = [];

    for(let i=0;i<5;i++){

        let r =
        top[
            Math.floor(
                Math.random()*top.length
            )
        ];

        result.push(r.pair);

    }

    alert(
        "🎲 AI RANDOM\n\n"+
        result.join("  ")
    );

}

function copyAll(){

    let text = "";

    text +=
    document.getElementById('hotCold')
    .innerText+"\n\n";

    text +=
    document.getElementById('pairLock')
    .innerText+"\n\n";

    text +=
    document.getElementById('winResult')
    .innerText+"\n\n";

    text +=
    document.getElementById('scoreResult')
    .innerText+"\n\n";

    text +=
    document.getElementById('reverseResult')
    .innerText+"\n\n";

    text +=
    document.getElementById('positionResult')
    .innerText;

    navigator.clipboard.writeText(text);

    alert("คัดลอกผลแล้ว");

}

function clearAll(){

    document.getElementById('inputData')
    .value = "";

    document
    .querySelectorAll('.result')
    .forEach(el=>{

        el.innerText = "";

    });

    localStorage.removeItem(
        'lao_ai_data'
    );

}

window.onload = ()=>{

    let save =
    localStorage.getItem(
        'lao_ai_data'
    );

    if(save){

        document.getElementById(
            'inputData'
        ).value = save;

    }

    analyze();

}

</script>

</body>
</html>
